server {
    listen 80;
    server_name opencode.cosymart.top;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name opencode.cosymart.top;

    ssl_certificate /etc/letsencrypt/live/opencode.cosymart.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/opencode.cosymart.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_comp_level 5;
    gzip_proxied any;
    gzip_types application/json text/plain text/css application/javascript text/javascript application/manifest+json;
    keepalive_timeout 65;
    keepalive_requests 1000;
    send_timeout 3600;

    location = / {
        proxy_pass http://127.0.0.1:33102/__landing;
        proxy_http_version 1.1;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Content-Security-Policy-Report-Only;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_socket_keepalive on;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    location = /global/event {
        proxy_pass http://127.0.0.1:33102;
        proxy_http_version 1.1;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Content-Security-Policy-Report-Only;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_socket_keepalive on;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_request_buffering off;
        proxy_buffering off;
        add_header X-Accel-Buffering no;
    }

    location = /__oc/events {
        proxy_pass http://127.0.0.1:33102;
        proxy_http_version 1.1;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Content-Security-Policy-Report-Only;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_socket_keepalive on;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_request_buffering off;
        proxy_buffering off;
        add_header X-Accel-Buffering no;
    }

    location / {
        proxy_pass http://127.0.0.1:33102;
        proxy_http_version 1.1;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Content-Security-Policy-Report-Only;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_socket_keepalive on;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_request_buffering off;
        proxy_buffering off;
    }
}
